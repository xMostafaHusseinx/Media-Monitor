<div class="stats-bar">
  <div class="stats-bar__item">
    <span class="stats-bar__value">{{ total }}</span>
    <span class="stats-bar__label">Total Stories</span>
  </div>
  <div class="stats-bar__item stats-bar__item--positive">
    <span class="stats-bar__value">{{ positive }}</span>
    <span class="stats-bar__label">Positive</span>
  </div>
  <div class="stats-bar__item stats-bar__item--neutral">
    <span class="stats-bar__value">{{ neutral }}</span>
    <span class="stats-bar__label">Neutral</span>
  </div>
  <div class="stats-bar__item stats-bar__item--negative">
    <span class="stats-bar__value">{{ negative }}</span>
    <span class="stats-bar__label">Negative</span>
  </div>
</div>
